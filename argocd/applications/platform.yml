apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: platform
  namespace: argocd

spec:
  project: platform

  source:
    repoURL: https://github.com/rs235/gitops.git
    targetRevision: main
    path: platform

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
