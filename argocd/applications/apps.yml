apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: apps
  namespace: argocd

spec:
  project: apps

  source:
    repoURL: https://github.com/rs235/gitops.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
