apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: nginx

  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx

    spec:
      containers:
        - name: nginx
          image: nginx:1.30

          ports:
            - name: http
              containerPort: 80

          resources:
            requests:
              cpu: 50m
              memory: 64Mi

            limits:
              cpu: 250m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /
              port: http

          livenessProbe:
            httpGet:
              path: /
              port: http
